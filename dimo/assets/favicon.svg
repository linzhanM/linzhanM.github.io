<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DIMO">
  <!-- Dark latent-space tile -->
  <rect width="64" height="64" rx="15" fill="#0B0E14" />
  <!-- One input fans into diverse trajectories (blue -> violet -> pink) -->
  <g fill="none" stroke-width="4.4" stroke-linecap="round">
    <path d="M19 32 C 30 22, 40 17, 50 15" stroke="#3B82F6" />
    <path d="M19 32 C 31 31, 41 31, 50 31" stroke="#8B5CF6" />
    <path d="M19 32 C 30 42, 40 47, 50 49" stroke="#FF5C8A" />
  </g>
  <!-- Trajectory-end keypoints -->
  <circle cx="50" cy="15" r="4" fill="#3B82F6" />
  <circle cx="50" cy="31" r="4" fill="#8B5CF6" />
  <circle cx="50" cy="49" r="4" fill="#FF5C8A" />
  <!-- Origin: the single input -->
  <circle cx="19" cy="32" r="5.4" fill="#F4F6FA" />
</svg>
